# ================== JPA / HIBERNATE ==================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.main.allow-bean-definition-overriding=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
# Prevent ddl-auto=update FK failures from escalating; orphaned data is cleaned via V09 migration
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false

# ================== DATABASE MIGRATIONS ==================
# NOTE: All migration scripts use DO-block guards (IF to_regclass(...) IS NOT NULL)
# so they safely skip operations on Hibernate-managed tables that don't exist yet.
# DO NOT add spring.jpa.defer-datasource-initialization=true — it causes a circular
# bean dependency between 'flyway' and 'entityManagerFactory' in Spring Boot 3.x.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true
# Auto-repair removes any failed migration entries from flyway_schema_history before re-running.
# Required when a previous migration (e.g. V06) failed partway through and left a broken record.
spring.flyway.repair-on-migrate=true


